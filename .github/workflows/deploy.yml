name: Build and deploy site

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"

      # Uses `npm install` rather than `npm ci` because docs-site has no
      # committed package-lock.json yet. Switch to `npm ci` (and add
      # `cache: "npm"` above) once one is committed — see repo README /
      # ask in #flixir-dev if this comment is stale and it's already there.
      - cache: "npm"
      - run: npm ci

      - run: npm run build

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
