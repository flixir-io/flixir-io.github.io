site_name: FlowNet
site_description: >-
  FlowNet is a visual workflow automation engine built for Shopify.
  Automate your store without writing code.
site_url: https://flixir-io.github.io/
repo_url: https://github.com/flixir-io/flixir-io.github.io
repo_name: flixir-io/flixir-io.github.io
edit_uri: edit/main/docs/

theme:
  name: material
  custom_dir: overrides
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit

extra_css:
  - assets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - tables
  - toc:
      permalink: true

# ---------------------------------------------------------------
# THE MENU. This is the one place to edit when adding, renaming,
# reordering, or removing pages from the navigation.
# ---------------------------------------------------------------
nav:
  - Home: index.md
  - Docs:
      - Overview: docs/index.md
      - Guides:
          - Expressions: docs/expressions.md
          - Storage: docs/storage.md
      - Triggers:
          - Manual: docs/triggers/manual.md
          - Webhook: docs/triggers/webhook.md
          - Scheduled: docs/triggers/cron.md
          - Shopify: docs/triggers/shopify.md
          - Storage Changed: docs/triggers/storage-changed.md
      - Steps:
          - Debug: docs/steps/debug.md
          - HTTP Request: docs/steps/http-request.md
          - Lua script: docs/steps/lua-script.md
          - Condition: docs/steps/condition.md
          - Loop: docs/steps/loop.md
          - Shopify GraphQL: docs/steps/shopify-graphql.md
          - Gemini: docs/steps/gemini.md
          - "Storage: Write": docs/steps/storage-write.md
          - "Storage: Read": docs/steps/storage-read.md
          - "Storage: Update": docs/steps/storage-update.md
          - "Storage: Delete": docs/steps/storage-delete.md

extra:
  social:
    - icon: fontawesome/brands/youtube
      link: https://www.youtube.com/@flownetio
      name: FlowNet on YouTube
